version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://coe_admin:SecretPassword123@postgres:5432/postgres
      - VT_DB_URL=postgresql://coe_admin:SecretPassword123@postgres:5432/vt_db
      - VTI_DB_URL=postgresql://coe_admin:SecretPassword123@postgres:5432/vti_db
      - NVIDIA_DB_URL=postgresql://coe_admin:SecretPassword123@postgres:5432/nvidia_db
      - TEST1_DB_URL=postgresql://coe_admin:SecretPassword123@postgres:5432/test1_db
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: lms-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=coe_admin
      - POSTGRES_PASSWORD=SecretPassword123
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
